  { name: 'Bang Chan', group: 'Stray Kids', birth: '1997-10-03', emoji: '🐺' },
  { name: 'Lee Know', group: 'Stray Kids', birth: '1998-10-25', emoji: '🐱' },
  { name: 'Changbin', group: 'Stray Kids', birth: '1999-08-11', emoji: '🔥' },
  { name: 'Hyunjin', group: 'Stray Kids', birth: '2000-03-20', emoji: '🎨' },
  { name: 'Han', group: 'Stray Kids', birth: '2000-09-14', emoji: '🐿️' },
  { name: 'Felix', group: 'Stray Kids', birth: '2000-09-15', emoji: '🌟' },
  { name: 'Seungmin', group: 'Stray Kids', birth: '2000-09-22', emoji: '🐶' },
  { name: 'I.N', group: 'Stray Kids', birth: '2001-02-08', emoji: '🌱' },
];

const groups = ['BTS', 'BLACKPINK', 'TWICE', 'aespa', 'Stray Kids'];
let activeGroup = 'BTS';
let userKrAge = 0;
let userBirth = null;

// Korean age calculation
function getKoreanAge(birthDate, referenceDate) {
  const ref = referenceDate || new Date();
  return ref.getFullYear() - birthDate.getFullYear() + 1;
}

function getIntAge(birthDate, referenceDate) {
  const ref = referenceDate || new Date();
  let age = ref.getFullYear() - birthDate.getFullYear();
  const m = ref.getMonth() - birthDate.getMonth();
  if (m < 0 || (m === 0 && ref.getDate() < birthDate.getDate())) age--;
  return age;
}

const zodiacSigns = [
  { sign: '♑', name: 'Capricorn', start: [12,22], end: [1,19] },
  { sign: '♒', name: 'Aquarius', start: [1,20], end: [2,18] },
  { sign: '♓', name: 'Pisces', start: [2,19], end: [3,20] },
  { sign: '♈', name: 'Aries', start: [3,21], end: [4,19] },
  { sign: '♉', name: 'Taurus', start: [4,20], end: [5,20] },
  { sign: '♊', name: 'Gemini', start: [5,21], end: [6,20] },
  { sign: '♋', name: 'Cancer', start: [6,21], end: [7,22] },
  { sign: '♌', name: 'Leo', start: [7,23], end: [8,22] },
  { sign: '♍', name: 'Virgo', start: [8,23], end: [9,22] },
  { sign: '♎', name: 'Libra', start: [9,23], end: [10,22] },
  { sign: '♏', name: 'Scorpio', start: [10,23], end: [11,21] },
  { sign: '♐', name: 'Sagittarius', start: [11,22], end: [12,21] },
];

function getZodiac(month, day) {
  for (const z of zodiacSigns) {
    const [sm, sd] = z.start; const [em, ed] = z.end;
    if ((month === sm && day >= sd) || (month === em && day <= ed)) return z;
    if (sm > em) { // wraps year (Capricorn)
      if (month === sm && day >= sd) return z;
      if (month === em && day <= ed) return z;
    }
  }
  return zodiacSigns[11];
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function calculate() {
  const year = parseInt(document.getElementById('birthYear').value);
  const month = parseInt(document.getElementById('birthMonth').value);
  const day = parseInt(document.getElementById('birthDay').value);
  if (!year || !month || !day || year < 1920 || year > 2020) {
    alert('Please enter a valid birthday!'); return;
  }
  userBirth = new Date(year, month - 1, day);
  const today = new Date();
  const krAge = getKoreanAge(userBirth);
  const intAge = getIntAge(userBirth);
  userKrAge = krAge;

  // Hero
  document.getElementById('krAgeNum').textContent = krAge;
  document.getElementById('krAgeSub').textContent = `International age: ${intAge} years old`;
  document.getElementById('r-krAge').textContent = krAge;
  document.getElementById('r-intAge').textContent = intAge;

  // Zodiac
  const zodiac = getZodiac(month, day);
  document.getElementById('r-zodiac').textContent = zodiac.sign;
  document.getElementById('r-zodiacName').textContent = zodiac.name;

  // Explain
  const diff = krAge - intAge;
  document.getElementById('explainText').innerHTML =
    `You were born on <strong>${userBirth.toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'})}</strong>. ` +
    `In Korea, you are <strong>${krAge} years old</strong> — that's <strong>${diff} year${diff!==1?'s':''} more</strong> than your international age (${intAge}). ` +
    `Korean age = Current year (${today.getFullYear()}) − Birth year (${year}) + 1 = <strong>${krAge}</strong>.`;

  // Share text
  document.getElementById('shareText').textContent =
    `My Korean age is ${krAge}! 🇰🇷 (International: ${intAge}) — What's yours? #KoreanAge #Kpop`;

  // Render group tabs & idols
  renderGroupTabs();
  renderIdols();

  const el = document.getElementById('result');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

function renderGroupTabs() {
  const el = document.getElementById('groupTabs');
  el.innerHTML = groups.map(g =>
    `<button class="group-tab${g===activeGroup?' active':''}" onclick="switchGroup('${g}')">${g}</button>`
  ).join('');
}

function switchGroup(g) {
  activeGroup = g;
  renderGroupTabs();
  renderIdols();
}

function renderIdols() {
  const el = document.getElementById('idolGrid');
  const groupIdols = activeGroup === 'My Idols'
    ? customIdols
    : idols.filter(i => i.group === activeGroup);

  if (groupIdols.length === 0) {
    el.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--text-faint);font-size:13px">
      No idols added yet. Add your favorite idol below! ⬇️
    </div>`;
    return;
  }

  el.innerHTML = groupIdols.map(idol => {
    const idolBirth = new Date(idol.birth + 'T00:00:00');
    const idolKrAge = getKoreanAge(idolBirth);
    const diff = userKrAge - idolKrAge;
    let cls = '', diffLabel = '', diffClass = '';
    if (diff === 0) { cls = 'same-age'; diffLabel = 'Same Korean age! 🎉'; diffClass = 'diff-same'; }
    else if (diff > 0) { cls = 'older'; diffLabel = `${diff} yr${Math.abs(diff)>1?'s':''} older than you`; diffClass = 'diff-older'; }
    else { cls = 'younger'; diffLabel = `${Math.abs(diff)} yr${Math.abs(diff)>1?'s':''} younger than you`; diffClass = 'diff-younger'; }

    const ageColor = diff === 0 ? 'var(--gold)' : diff > 0 ? 'var(--purple)' : 'var(--cyan)';
    return `<div class="idol-card ${cls}">
      <div class="idol-emoji">${idol.emoji}</div>
      <div class="idol-name">${idol.name}</div>
      <div class="idol-group">${idol.group}</div>
      <div class="idol-kr-age" style="color:${ageColor}">${idolKrAge}</div>
      <div class="idol-bday">${formatDate(idol.birth)}</div>
      <span class="age-diff-badge ${diffClass}">${diffLabel}</span>
    </div>`;
  }).join('');
}

// ── CUSTOM IDOLS ──
let customIdols = [];

function addCustomIdol() {
  const name  = document.getElementById('c-name').value.trim();
  const group = document.getElementById('c-group').value.trim() || 'Custom';
  const year  = parseInt(document.getElementById('c-year').value);
  const month = parseInt(document.getElementById('c-month').value);
  const day   = parseInt(document.getElementById('c-day').value);

  if (!name) { alert('Please enter the idol\'s name!'); return; }
  if (!year || year < 1980 || year > 2015) { alert('Please enter a valid birth year (1980~2015)!'); return; }
  if (!month || month < 1 || month > 12) { alert('Please enter a valid birth month (1~12)!'); return; }
  if (!day || day < 1 || day > 31) { alert('Please enter a valid birth day!'); return; }

  const pad = n => String(n).padStart(2,'0');
  const birth = `${year}-${pad(month)}-${pad(day)}`;
  const id = Date.now();

  customIdols.push({ id, name, group, birth, emoji: '⭐' });

  // 입력 초기화
  ['c-name','c-group','c-year','c-month','c-day'].forEach(i => document.getElementById(i).value = '');

  renderCustomList();

  // 계산이 이미 된 상태라면 My Idols 탭으로 전환
  if (userKrAge > 0) {
    if (!groups.includes('My Idols')) groups.push('My Idols');
    activeGroup = 'My Idols';
    renderGroupTabs();
    renderIdols();
  }
}

function removeCustomIdol(id) {
  customIdols = customIdols.filter(c => c.id !== id);
  if (customIdols.length === 0) {
    const idx = groups.indexOf('My Idols');
    if (idx > -1) { groups.splice(idx, 1); activeGroup = 'BTS'; }
  }
  renderCustomList();
  if (userKrAge > 0) { renderGroupTabs(); renderIdols(); }
}

function renderCustomList() {
  const el = document.getElementById('customIdolList');
  if (customIdols.length === 0) {
    el.innerHTML = '<span class="custom-empty">No custom idols added yet.</span>';
    return;
  }
  el.innerHTML = customIdols.map(c =>
    `<div class="custom-idol-chip">
      ⭐ ${c.name} <span style="color:var(--text-faint)">(${c.group})</span>
      <button class="remove-btn" onclick="removeCustomIdol(${c.id})">×</button>
    </div>`
  ).join('');
}

function copyResult() {
  const text = document.getElementById('shareText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.innerHTML = '📋 Copy & Share', 2000);
  });
}
</script>
